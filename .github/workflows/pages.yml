name: Deploy wasm demo to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel a run superseded by a newer push.
concurrency:
  group: pages
  cancel-in-progress: true

# Run the bundled JS actions (checkout, setup-zig, upload-pages-artifact) on
# Node 24; Node 20 is removed from the runners in September 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      # Stages index.html + zgigye.wasm + the story under zig-out/web/.
      - run: zig build web
      - uses: actions/upload-pages-artifact@v3
        with:
          path: zig-out/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
