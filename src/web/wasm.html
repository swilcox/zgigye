<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>zgigye (wasm)</title>
<style>
  :root {
    color-scheme: dark;
    /* Default theme — mirrors the TUI "default": dark screen, bold yellow
       location, cyan italic keywords. The theme blocks below override these. */
    --bg: #1c1e26; --fg: #d5d8df;
    --header-bg: #d5d8df; --header-fg: #1c1e26;
    --accent: #8be08b;   /* prompt + caret */
    --dim: #7e8294;      /* system text, gear, settings */
    --loc-color: #e0c84d; --loc-weight: bold;
    --kw-color: #56c8c8; --kw-style: italic;
  }
  /* mono: attributes only, no highlight colour (TUI "mono"). */
  body.theme-mono { --loc-color: inherit; --kw-color: inherit; }
  /* c64: the Commodore 64 palette from theme.zig. */
  body.theme-c64 {
    --bg: #40318d; --fg: #7869c4;
    --header-bg: #7869c4; --header-fg: #40318d;
    --accent: #7869c4; --dim: #6a5cb5;
    --loc-color: #bfce72; --kw-color: #67b6bd;
  }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 16px/1.45 "SF Mono", Menlo, Consolas, monospace;
  }
  header {
    position: sticky; top: 0; display: flex; justify-content: space-between;
    padding: 0.3em 1rem; background: var(--header-bg); color: var(--header-fg);
    white-space: pre;
  }
  main { max-width: 42rem; margin: 0 auto; padding: 1rem 1rem 4rem; }
  pre { white-space: pre-wrap; word-break: break-word; margin: 0; }
  form { display: flex; gap: 0.5ch; margin-top: 0.2em; }
  .prompt { color: var(--accent); }
  input {
    flex: 1; background: none; border: none; outline: none;
    color: inherit; font: inherit; caret-color: var(--accent);
  }
  .system { color: var(--dim); font-style: italic; }
  body.hl-loc .loc { font-weight: var(--loc-weight); color: var(--loc-color); }
  body.hl-kw .kw { font-style: var(--kw-style); color: var(--kw-color); }
  #settings-bar {
    display: flex; flex-direction: column; align-items: flex-end;
    gap: 0.6em; margin-top: 1.5em;
  }
  #gear {
    background: none; border: none; padding: 0; cursor: pointer;
    color: var(--dim); font-size: 1.1em; line-height: 1;
  }
  #gear:hover, #gear[aria-expanded="true"] { color: var(--fg); }
  #settings {
    display: flex; gap: 1.5ch; align-items: center; justify-content: flex-end;
    color: var(--dim); font-size: 0.8em;
  }
  #settings[hidden] { display: none; }
  #settings label { display: flex; gap: 0.5ch; align-items: center; cursor: pointer; }
  #settings select {
    background: var(--bg); color: var(--fg); font: inherit;
    border: 1px solid var(--dim); border-radius: 3px; padding: 0 0.3ch;
  }
</style>
</head>
<body>
<header><span id="location">&nbsp;</span><span id="progress"></span></header>
<main>
  <pre id="output"></pre>
  <form id="form"><span class="prompt">&gt;</span><input id="input"
    autocomplete="off" autocapitalize="none" spellcheck="false" autofocus disabled></form>
  <div id="settings-bar">
    <button id="gear" type="button" title="Display settings"
      aria-label="Display settings" aria-expanded="false">&#9881;</button>
    <div id="settings" hidden>
      <label>theme
        <select id="opt-theme">
          <option value="default">default</option>
          <option value="mono">mono</option>
          <option value="c64">c64</option>
        </select>
      </label>
      <label><input type="checkbox" id="opt-loc" checked> bold location</label>
      <label><input type="checkbox" id="opt-kw" checked> italic keywords</label>
    </div>
  </div>
</main>
<script>
  // Which story to load, served alongside this page and the .wasm module.
  const STORY_URL = "minizork.z3";

  let state = null;
  const output = document.getElementById("output");
  const input = document.getElementById("input");

  function append(text, cls) {
    const span = document.createElement("span");
    if (cls) span.className = cls;
    span.textContent = text;
    output.appendChild(span);
    input.scrollIntoView();
  }

  // --- WASM transport -----------------------------------------------------
  // Replaces index.html's fetch("/turn"): the same JSON now comes straight
  // out of the module. The call boundary only carries numbers, so strings
  // cross as (pointer, length) into the module's linear memory. Always
  // re-read `memory.buffer` after a call: growing the heap detaches the old
  // ArrayBuffer.
  let wasm = null;
  const enc = new TextEncoder();
  const dec = new TextDecoder();
  const mem = () => new Uint8Array(wasm.memory.buffer);

  function copyIn(bytes) {              // -> { ptr, len }; caller frees
    const ptr = wasm.alloc(bytes.length);
    if (!ptr) throw new Error("wasm alloc failed");
    mem().set(bytes, ptr);
    return { ptr, len: bytes.length };
  }

  function readResult(ptr) {            // the JSON the last call returned
    const len = wasm.resultLen();
    return JSON.parse(dec.decode(mem().subarray(ptr, ptr + len)));
  }

  function startGame() {
    return readResult(wasm.start());
  }

  function advanceGame(stateB64, command) {
    const s = copyIn(enc.encode(stateB64));
    const i = copyIn(enc.encode(command));
    const turn = readResult(wasm.advance(s.ptr, s.len, i.ptr, i.len));
    wasm.dealloc(s.ptr, s.len);
    wasm.dealloc(i.ptr, i.len);
    return turn;
  }

  async function initWasm() {
    // Plain instantiate (not Streaming) so it works regardless of whether
    // the static server labels .wasm as application/wasm.
    const bytes = await (await fetch("zgigye.wasm")).arrayBuffer();
    const { instance } = await WebAssembly.instantiate(bytes, {});
    wasm = instance.exports;

    const story = new Uint8Array(await (await fetch(STORY_URL)).arrayBuffer());
    const s = copyIn(story);
    const ok = wasm.setStory(s.ptr, s.len);
    wasm.dealloc(s.ptr, s.len);
    if (!ok) throw new Error("setStory failed");
  }

  // --- Highlight toggles (identical to the HTTP demo) ---------------------
  const kindClass = { location: "loc", keyword: "kw" };
  for (const [id, cls] of [["opt-loc", "hl-loc"], ["opt-kw", "hl-kw"]]) {
    const box = document.getElementById(id);
    box.checked = localStorage.getItem(id) !== "off";
    const apply = () => {
      document.body.classList.toggle(cls, box.checked);
      localStorage.setItem(id, box.checked ? "on" : "off");
    };
    box.addEventListener("change", apply);
    apply();
  }

  // The toggles stay out of the way behind a gear until someone wants them.
  const gear = document.getElementById("gear");
  const settings = document.getElementById("settings");
  gear.addEventListener("click", () => {
    const opening = settings.hasAttribute("hidden");
    settings.toggleAttribute("hidden", !opening);
    gear.setAttribute("aria-expanded", String(opening));
  });

  // Theme picker: swaps a body class the CSS variables key off, persisted
  // like the toggles. "default" is just the bare :root variables.
  const themeSel = document.getElementById("opt-theme");
  themeSel.value = localStorage.getItem("theme") || "default";
  const applyTheme = () => {
    document.body.classList.remove("theme-mono", "theme-c64");
    if (themeSel.value !== "default") document.body.classList.add("theme-" + themeSel.value);
    localStorage.setItem("theme", themeSel.value);
  };
  themeSel.addEventListener("change", applyTheme);
  applyTheme();

  // --- Rendering (identical to the HTTP demo) -----------------------------
  function show(turn) {
    if (!turn) return;
    if (turn.error) {
      append(`\n[error: ${turn.error}]\n`, "system");
      input.disabled = true;
      return;
    }
    // The game prints its own input prompt (usually ">") last; the input
    // row below plays that role here, so drop it from the last span.
    const spans = turn.output.slice();
    if (spans.length) {
      const last = spans[spans.length - 1];
      const stripped = last.text.replace(/>\s*$/, "");
      if (stripped !== last.text) {
        spans.pop();
        if (stripped) spans.push({ text: stripped, kind: last.kind });
      }
    }
    for (const span of spans) append(span.text, kindClass[span.kind]);
    if (turn.status) {
      document.getElementById("location").textContent = turn.status.location;
      const p = turn.status.progress;
      document.getElementById("progress").textContent = p.score
        ? `Score: ${p.score.score}   Moves: ${p.score.turns}`
        : `${p.time.hours}:${String(p.time.minutes).padStart(2, "0")}`;
    }
    state = turn.state;
    if (!state) {
      append("\n[The game has ended. Reload the page to start again.]\n", "system");
      input.disabled = true;
    }
  }

  document.getElementById("form").addEventListener("submit", (e) => {
    e.preventDefault();
    if (!state || !input.value) return;
    const command = input.value;
    input.value = "";
    append(`> ${command}\n`);
    show(advanceGame(state, command));
  });

  // --- Boot ---------------------------------------------------------------
  initWasm().then(() => {
    input.disabled = false;
    input.focus();
    show(startGame());
  }).catch((err) => {
    append(`[failed to load: ${err.message}]\n`, "system");
  });
</script>
</body>
</html>
